<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Discovery Engine - Hari Edition</title>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* ORIGINAL UI DESIGN  */
        :root { --accent: #3b82f6; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; }
        
        .hero { 
            background: linear-gradient(135deg, #25247a 0%, #0f172a 100%); 
            padding: 50px 0; border-bottom: 3px solid var(--accent); 
        }

        .filter-panel { 
            background: white; border-radius: 20px; color: #1e293b; 
            padding: 30px; margin-top: -50px; 
        }

        #rating { accent-color: #6366f1; } 
        #rating::-webkit-slider-runnable-track { background: #e2e8f0; height: 10px; border-radius: 5px; }

        .genre-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 12px; max-height: 250px; overflow-y: auto; 
            border: 1px solid #cbd5e1; padding: 20px; border-radius: 12px; background: #f8fafc; 
        }

        .tag-pill { 
            display: flex; align-items: center; background: white; padding: 6px 12px; 
            border-radius: 8px; border: 1px solid #cbd5e1; font-size: 0.85rem; cursor: pointer; 
        }
        .tag-pill:hover { background: #e2e8f0; }

        .status-container { 
            display: flex; align-items: center; font-size: 0.7rem; font-weight: bold; 
            text-transform: uppercase; margin-bottom: 8px; 
        }
        .dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .dot-completed { background-color: #00ff5e; }
        .dot-ongoing { background-color: #eab308; }
        .dot-upcoming { background-color: #3b82f6; }

        .anime-card { 
            background: var(--card); border: none; border-radius: 15px; 
            transition: 0.3s; height: 100%; border: 1px solid transparent; 
        }
        .anime-card:hover { 
            transform: translateY(-8px); border-color: var(--accent); 
            box-shadow: 0 15px 30px rgba(0,0,0,0.5); 
        }

        .anime-title { cursor: pointer; color: #60a5fa; font-weight: 600; text-decoration: none; }

        .modal-content { 
            background-color: #1e293b; color: white; 
            border: 1px solid var(--accent); border-radius: 20px; 
        }
        .modal-poster { 
            width: 100%; border-radius: 10px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #334155; 
        }
        .about-box { 
            background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; 
            border-left: 4px solid var(--accent); font-size: 0.95rem; line-height: 1.6; 
        }
        .meta-label { 
            color: #94a3b8; font-weight: bold; font-size: 0.75rem; 
            text-transform: uppercase; display: block; margin-top: 10px; 
        }
        .meta-val { color: white; font-size: 0.9rem; }

        /* Level 1: Watch Button Style */
        .btn-watch { background-color: #830078; color: white; font-weight: 800; border: none; padding: 15px; border-radius: 12px; transition: 0.3s; }
        .btn-watch:hover { background-color: #d93030; color: white; transform: scale(1.02); }
    </style>
</head>
<body class="pb-5">

<div class="hero text-center mb-5">
    <h1 class="fw-bold" data-aos="zoom-in">🎌 AnimeXind 🎌</h1>
    <p class="text-secondary" data-aos="fade-up">By Hari...</p>
</div>

<div class="container">
    <div class="filter-panel shadow-lg mb-5" data-aos="fade-up">
        <div class="row g-4">
            <div class="col-12">
                <label class="fw-bold mb-2">1. Minimum Rating: <span id="r-val" class="text-primary">8.0</span></label>
                <input type="range" id="rating" class="form-range" min="0" max="10" step="0.1" value="8" oninput="document.getElementById('r-val').innerText = this.value">
            </div>
            <div class="col-12">
                <label class="fw-bold mb-2">2. Select Favorite Genres:</label>
                <div class="genre-grid" id="tag-container"></div>
            </div>
            <div class="col-12 d-flex gap-2">
                <button onclick="startSearch()" class="btn btn-primary flex-grow-1 py-3 fw-bold shadow-sm">FIND ANIME MATCHES</button>
                <button onclick="resetFilters()" class="btn btn-outline-danger px-4 fw-bold shadow-sm">RESET</button>
            </div>
        </div>
    </div>

    <div id="results" class="row"></div>
    
    <div class="text-center mt-5 mb-5">
        <button id="nextBtn" onclick="goToNextPage()" class="btn btn-lg btn-primary px-5 shadow" style="display:none;">
            SEE NEXT 50 ANIME (PAGE <span id="nextPageNum">2</span>) →
        </button>
    </div>
</div>

<div class="modal fade" id="animeModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-xl">
        <div class="modal-content shadow-lg">
            <div class="modal-body p-4">
                <div class="row">
                    <div class="col-md-3 text-center">
                        <img id="m-poster" src="" class="modal-poster mb-3">
                        <small class="text-info italic" id="m-load-msg">Updating live details...</small>
                    </div>
                    <div class="col-md-6 px-4 border-end border-secondary">
                        <h2 class="fw-bold mb-1" id="m-title"></h2>
                        <div class="mb-3">
                            <span class="badge bg-warning text-dark px-3 py-1" id="m-score"></span>
                            <span class="badge bg-primary px-3 py-1 ms-2" id="m-type"></span>
                        </div>
                        <h6 class="text-primary fw-bold mt-4">OVERVIEW / ABOUT</h6>
                        <div class="about-box"><p id="m-desc" class="mb-0"></p></div>
                    </div>
                    <div class="col-md-3 ps-4" id="modal-sidebar">
                        <span class="meta-label">English Title:</span>
                        <span class="meta-val" id="m-eng"></span>
                        <span class="meta-label">Original Japanese:</span>
                        <span class="meta-val" id="m-jap"></span>
                        <span class="meta-label">Status:</span>
                        <span class="meta-val" id="m-status"></span>
                        <span class="meta-label">Total Episodes:</span>
                        <span class="meta-val" id="m-eps"></span>
                        <span class="meta-label">Genres:</span>
                        <span class="meta-val small" id="m-genres"></span>
                        
                        <button type="button" class="btn btn-outline-light w-100 mt-5" data-bs-dismiss="modal">Close</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

<script>
    AOS.init({ duration: 800, once: true });

    const API_BASE_URL = "http://127.0.0.1:8000"; 
    const tags = ["Action", "Adventure", "Cars", "Comedy", "Dementia", "Isekai", "Demons", "Drama", "Ecchi", "Fantasy", "Game", "Harem", "Historical", "Horror", "Josei", "Kids", "Magic", "Martial Arts", "Mecha", "Military", "Music", "Mystery", "Parody", "Police", "Psychological", "Romance", "Samurai", "School", "Sci-Fi", "Seinen", "Shoujo", "Shoujo Ai", "Shounen", "Shounen Ai", "Slice of Life", "Space", "Sports", "Super Power", "Supernatural", "Thriller", "Vampire", "Yaoi", "Yuri"];
    const list = document.getElementById('tag-container');
    tags.forEach(t => { list.innerHTML += `<div class="tag-pill"><input type="checkbox" class="g-check" value="${t}" id="g-${t}"><label class="mb-0 w-100" for="g-${t}">${t}</label></div>`; });

    let currentResults = [];
    let currentPage = 1;

    function resetFilters() {
        currentPage = 1;
        document.getElementById('rating').value = 8;
        document.getElementById('r-val').innerText = "8.0";
        document.querySelectorAll('.g-check').forEach(cb => cb.checked = false);
        document.getElementById('results').innerHTML = "";
        document.getElementById('nextBtn').style.display = "none";
    }

    async function startSearch() {
        currentPage = 1;
        document.getElementById('results').innerHTML = ""; 
        await executeSearch();
    }

    async function goToNextPage() {
        currentPage++;
        await executeSearch();
        window.scrollTo(0, document.body.scrollHeight - 2000); 
    }

    async function executeSearch() {
        const r = document.getElementById('rating').value;
        const g = Array.from(document.querySelectorAll('.g-check:checked')).map(c => c.value).join(',');
        const area = document.getElementById('results');
        const nextBtn = document.getElementById('nextBtn');

        try {
            const response = await fetch(`${API_BASE_URL}/search?genres=${g}&min_rating=${r}&page=${currentPage}`);
            const newData = await response.json();
            currentResults = (currentPage === 1) ? newData : [...currentResults, ...newData];

            newData.forEach((a) => {
                let dotClass = a.status === 'on-going' ? 'dot-ongoing' : (a.status === 'upcoming' ? 'dot-upcoming' : 'dot-completed');
                let displayName = a.english_name || a.name;
                const globalIndex = currentResults.indexOf(a);

                area.innerHTML += `
                    <div class="col-lg-3 col-md-6 mb-4" data-aos="fade-up">
                        <div class="card p-3 anime-card">
                            <div class="status-container"><span class="dot ${dotClass}"></span>${a.status.toUpperCase()}</div>
                            <h6 class="anime-title text-truncate" onclick="showDetails(${globalIndex})">${displayName}</h6>
                            <p class="text-secondary small mb-3" style="font-size: 0.7rem;">${a.genre}</p>
                            <div class="mt-auto pt-2 border-top border-secondary d-flex justify-content-between">
                                <span class="badge bg-warning text-dark">★ ${a.rating}</span>
                                <small class="text-muted">${a.episodes} eps</small>
                            </div>
                        </div>
                    </div>`;
            });

            if (newData.length === 50) {
                nextBtn.style.display = "inline-block";
                document.getElementById('nextPageNum').innerText = currentPage + 1;
            } else { nextBtn.style.display = "none"; }
        } catch (e) { area.innerHTML = "Backend Error!"; }
    }

    async function showDetails(index) {
        const a = currentResults[index];
        
        // LEVEL 1: HI-ANIMES.SE SEARCH LOGIC
        const animeTitle = (a.english_name || a.name).trim();
        const watchLink = `https://hianimes.se/search?keyword=${encodeURIComponent(animeTitle)}`;

        document.getElementById('m-title').innerText = a.english_name || a.name;
        document.getElementById('m-eng').innerText = a.english_name || "N/A";
        document.getElementById('m-jap').innerText = a.name;
        document.getElementById('m-score').innerText = "Score: ★ " + a.rating;
        document.getElementById('m-type').innerText = a.type;
        document.getElementById('m-status').innerText = a.status.toUpperCase();
        document.getElementById('m-eps').innerText = a.episodes;
        document.getElementById('m-genres').innerText = a.genre;
        document.getElementById('m-poster').src = "https://via.placeholder.com/300x450?text=Fetching...";
        document.getElementById('m-load-msg').style.display = "block";

        // WATCH BUTTON INJECTION [cite: 42]
        const sidebar = document.getElementById('modal-sidebar');
        if(document.getElementById('watch-btn')) document.getElementById('watch-btn').remove();
        
        const watchBtn = document.createElement('a');
        watchBtn.id = 'watch-btn';
        watchBtn.href = watchLink;
        watchBtn.target = '_blank';
        watchBtn.className = 'btn-watch btn w-100 mt-3';
        watchBtn.innerHTML = '▶ WATCH NOW';
        sidebar.insertBefore(watchBtn, sidebar.querySelector('button'));

        new bootstrap.Modal(document.getElementById('animeModal')).show();

        try {
            const res = await fetch(`${API_BASE_URL}/live-details/${a.anime_id}`);
            const live = await res.json();
            if(!live.error) {
                document.getElementById('m-poster').src = live.real_image;
                document.getElementById('m-desc').innerText = live.real_about;
                document.getElementById('m-load-msg').style.display = "none";
            }
        } catch (e) { console.log("Lively update failed...."); }
    }
</script>
</body>
</html>
